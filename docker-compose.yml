
services:
  backend:
    build: .
    container_name: job-finder-backend
    ports:
      - '5002:5002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      REDIS_URL: ${REDIS_URL}
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: ${PORT}
    networks:
      - job-network

    volumes:
      - .:/app

  postgres:
    image: postgres:16
    container_name: job-finder-db
    restart: always
    ports:
      - "5432:5432"  # This lets your computer also talk to the DB
    networks:
      - job-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d job_finder"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: job_finder
    volumes:
      - pgdata:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: job-finder-pgadmin
    ports:
    - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - job-network

  redis:
    image: redis:7-alpine
    container_name: job-finder-redis
    ports:
      - "6379:6379"
    networks:
      - job-network
    restart: unless-stopped

networks:
  job-network:
    driver: bridge

volumes:
  pgdata: